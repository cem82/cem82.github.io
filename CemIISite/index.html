<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CemII</title>
  <meta name="description" content="Portfolio of CemII." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient layers -->
  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="scan-line" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="#top" class="nav-brand">
        <span class="nav-mark">◉</span>
        <span class="nav-brand-name">cemII</span>
      </a>
      <div class="nav-links">
        <a href="#about">about</a>
        <a href="#games">games</a>
        <a href="#projects">projects</a>
        <a href="#repos">repos</a>
        <a href="#contact">contact</a>
      </div>
      <div class="nav-status" aria-label="status">
        <span class="status-dot"></span>
        <span class="status-text">online</span>
      </div>
    </div>
  </nav>

  <main id="top">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-meta">
        <span class="meta-left">§ 00 / hello_world</span>
        <span class="meta-right">[<span id="clock">--:--:--</span> UTC]</span>
      </div>

      <h1 class="hero-name" id="hero-name"></h1>

      <div class="hero-tagline">
        <span class="prompt">&gt;</span>
        <span id="hero-role"></span><span class="cursor">▊</span>
      </div>

      <dl class="hero-details">
        <div class="detail-row">
          <dt>Role</dt>
          <dd id="hero-role-detail">—</dd>
        </div>
        <div class="detail-row">
          <dt>Stack</dt>
          <dd id="hero-stack">—</dd>
        </div>
      </dl>

      <div class="hero-scroll">
        <span class="scroll-line"></span>
        <span class="scroll-text">scroll</span>
      </div>
    </section>

    <!-- About -->
    <section class="section" id="about">
      <header class="section-header">
        <span class="section-num">§ 01</span>
        <h2 class="section-title">about</h2>
        <span class="section-rule"></span>
      </header>
      <div class="about-content" id="about-content"></div>
    </section>

    <!-- Games -->
    <section class="section" id="games">
      <header class="section-header">
        <span class="section-num">§ 02</span>
        <h2 class="section-title">games</h2>
        <span class="section-rule"></span>
        <span class="section-count" id="games-count"></span>
      </header>
      <div class="cards" id="games-grid"></div>
    </section>

    <!-- Projects -->
    <section class="section" id="projects">
      <header class="section-header">
        <span class="section-num">§ 03</span>
        <h2 class="section-title">projects</h2>
        <span class="section-rule"></span>
        <span class="section-count" id="projects-count"></span>
      </header>
      <div class="cards" id="projects-grid"></div>
    </section>

    <!-- Repos -->
    <section class="section" id="repos">
      <header class="section-header">
        <span class="section-num">§ 04</span>
        <h2 class="section-title">repositories</h2>
        <span class="section-rule"></span>
      </header>
      <div class="repo-meta">
        <span>// pulling latest from </span>
        <a id="gh-link" target="_blank" rel="noopener noreferrer">@—</a>
      </div>
      <div class="repos" id="repos-grid"></div>
    </section>

    <!-- Contact -->
    <section class="section section-contact" id="contact">
      <header class="section-header">
        <span class="section-num">§ 05</span>
        <h2 class="section-title">contact</h2>
        <span class="section-rule"></span>
      </header>
      <div class="contact-content" id="contact-content"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span>© <span id="year"></span> — cemII</span>
      <span class="footer-sig">// end of transmission</span>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
